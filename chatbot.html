<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>


    <script type="text/babel">

      function ChatInput() {
        return (
          <>
            <input
              placeholder="Send a message to Chatbot"
              size="30" 
            />
            <button>Send</button>
          </>
        ); // fragments
      }


                            // another shortcut does the same
      function ChatMessage({ message, sender }) {
        // const message = props.message;
        // const sender = props.sender;


        // const { message, sender } = props; // shortcut
        /* if (sender === 'robot') {
          return (
            <div>
              <img src="robot.png" width="50" />
              {message}
            </div>
          );
        } */

          return (
          <div>
            { sender === 'robot' && (
              <img src="robot.png" width="50" />
            )}

            {message}

            { sender === 'user' && (
              <img src="user.png" width="50" />
            )}
          </div>
        );
      } // props, // shortcut

      function ChatMessages() {
        const array =  React.useState([{
          message: 'hello chatbot',
          sender: 'user',
          if: 'id1'
        },{
          message: 'Hello! How can I help you?',
          sender: 'robot',
          id: 'id2'
        },{
          message: 'can you get me todays date?',
          sender: 'user',
          id: 'id3'
        },{
          message: 'Today is September 27',
          sender: 'robot',
          id: 'id4'
        }]);
        const chatMessage = array[0];       // current value of chatMessages
        const setChatMessages = array[1];    //let us update the data
        
        // event handlers , spread operator(...chatMessages)
        function sendMessage() {
          setChatMessages([
            ...chatMessages
          ])
        }

        return (
          <>
            <button onClick={sendMessage}>Send message</button>


            {chatMessages.map((chatMessage) => {
                    return (
                      <ChatMessage 
                        message={chatMessage.message}
                        sender={chatMessage.sender}
                        key={chatMessage.id}
                      />
                    );
            })}
          </>
          );
      }


      function App() {
        return (
          <>
              <ChatInput /> 
              <ChatMessages />  
          </>
        );
      } // components syntax

      const container = document.querySelector('.js-container');

      ReactDOM.createRoot(container).render(<App/>);
    </script>
  </body>
</html>
